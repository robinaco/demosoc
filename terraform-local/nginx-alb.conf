<< 'EOF'
events {
    worker_connections 1024;
}

http {
    upstream jenkins_target_group {
        server jenkins-service:8080;
    }

    upstream app_target_group {
        server app-service:8080;
    }

    server {
        listen 80;
        server_name localhost;

        location /health {
            access_log off;
            return 200 "healthy\n";
        }

        location /jenkins/ {
            proxy_pass http://jenkins_target_group/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://app_target_group/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
EOF