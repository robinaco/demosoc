image: gradle:8.5-jdk17

stages:
  - build
  - test
  - sonar

cache:
  paths:
    - .gradle/

before_script:
  - chmod +x gradlew

build:
  stage: build
  script:
    - ./gradlew clean compileJava --no-daemon

test:
  stage: test
  script:
    - ./gradlew test jacocoTestReport --no-daemon
  artifacts:
    reports:
      junit: build/test-results/test/*.xml


sonar:
  stage: sonar
  script:
    - echo "URL=$SONAR_HOST_URL"
    - ./gradlew sonar --no-daemon -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.organization=$SONAR_ORG -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.token=$SONAR_TOKEN -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
  only:
    - branches

