image: gradle:8.5-jdk17

stages:
  - build
  - test
  - sonar
  - docker
  - deploy
  - zap-security

cache:
  paths:
    - .gradle/
    - .gradle/caches

variables:
  # AWS Configuration
  AWS_REGION: 'us-east-1'
  ECR_REPOSITORY: 'qg-sonar-pipelines'
  IMAGE_NAME: 'qg-sonar-pipelines'
  
  # ECS Configuration
  ECS_CLUSTER: 'qg-sonar-pipelines'
  ECS_SERVICE: 'qg-sonar-pipelines-service'
  ECS_TASK_FAMILY: 'qg-sonar-pipelines-task'
  ECS_CONTAINER_NAME: 'qg-sonar-pipelines-container'

before_script:
  - chmod +x gradlew

# ============================================
# BUILD STAGE
# ============================================
build:
  stage: build
  script:
    - ./gradlew clean compileJava --no-daemon
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_MERGE_REQUEST_ID

# ============================================
# TEST STAGE
# ============================================
test:
  stage: test
  script:
    - ./gradlew test jacocoTestReport --no-daemon
  artifacts:
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/jacoco/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_MERGE_REQUEST_ID

# ============================================
# SONAR STAGE
# ============================================
sonar:
  stage: sonar
  needs: ["test"]
  dependencies:
    - test
  script:
    - |
      ./gradlew sonar --no-daemon \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.organization=$SONAR_ORG \
        -Dsonar.projectKey=$SONAR_PROJECT_KEY \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.qualitygate.wait=true \
        -Dsonar.qualitygate.timeout=600 \
        -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

# ============================================
# DOCKER BUILD & PUSH TO ECR
# ============================================
docker:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache aws-cli
  script:
    # Autenticación en AWS ECR
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set region $AWS_REGION
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
    
    # Construir imagen
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA -t $IMAGE_NAME:latest .
    
    # Taggear para ECR
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_NAME:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
    
    # Push a ECR
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
    
    # Guardar variables para el siguiente job
    - echo "IMAGE_TAG=$CI_COMMIT_SHORT_SHA" > build.env
    - echo "DOCKER_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
  needs:
    - sonar

# ============================================
# DEPLOY TO ECS
# ============================================
deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache aws-cli jq
  script:
    # Autenticación en AWS
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set region $AWS_REGION
    
    # Obtener la definición de tarea actual
    - TASK_DEF=$(aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY)
    
    # Crear nueva definición con la imagen actualizada
    - |
      NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "$DOCKER_IMAGE" '
        .taskDefinition |
        .containerDefinitions[0].image = $IMAGE |
        {
          family: .family,
          containerDefinitions: .containerDefinitions,
          volumes: .volumes,
          networkMode: .networkMode,
          requiresCompatibilities: .requiresCompatibilities,
          cpu: .cpu,
          memory: .memory,
          executionRoleArn: .executionRoleArn,
          taskRoleArn: .taskRoleArn
        }
      ')
    
    - echo "$NEW_TASK_DEF" > task-def.json
    
    # Registrar nueva definición de tarea
    - aws ecs register-task-definition --cli-input-json file://task-def.json
    
    # Obtener la nueva versión de la definición de tarea
    - NEW_TASK_REVISION=$(aws ecs register-task-definition --cli-input-json file://task-def.json | jq -r '.taskDefinition.revision')
    
    # Actualizar el servicio de ECS con la nueva revisión
    - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $ECS_TASK_FAMILY:$NEW_TASK_REVISION --force-new-deployment
    
    - echo "Deployment completed successfully."
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
  needs:
    - docker

# ============================================
# OWASP ZAP SECURITY SCAN
# ============================================
owasp-zap-security:
  stage: zap-security
  image: owasp/zap2docker-stable:latest
  variables:
    OPENAPI_URL: "http://qg-sonar-pipelines-alb-1857521633.us-east-1.elb.amazonaws.com/v3/api-docs"

  script:
    - |
      echo "Iniciando escaneo de seguridad OWASP ZAP"
      echo "OpenAPI URL: $OPENAPI_URL"

      curl -s -o /dev/null $OPENAPI_URL && echo "Status: 200 OK" || echo "Status: ERROR"

      echo "Ejecutando escaneo de vulnerabilidades..."
      /zap/zap-api-scan.py -t $OPENAPI_URL -f openapi -r zap_report.html

      EXIT_CODE=$?

      echo "========================================="
      echo "ZAP Exit Code: $EXIT_CODE"
      echo "========================================="

      if [ $EXIT_CODE -eq 2 ]; then
        echo "ERROR: Se encontraron vulnerabilidades"
        exit 1
      fi

      if [ $EXIT_CODE -eq 1 ]; then
        echo "WARNING: Se encontraron advertencias"
      fi

      if [ $EXIT_CODE -eq 0 ]; then
        echo "OK: No se detectaron vulnerabilidades criticas"
      fi

  artifacts:
    name: "zap-report-${CI_COMMIT_SHORT_SHA}"
    paths:
      - zap_report.html
    expire_in: 30 days
    when: always

  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

  needs:
    - deploy