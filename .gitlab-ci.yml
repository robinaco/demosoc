image: gradle:8.5-jdk17

stages:
  - build
  - test
  - sonar
  - quality_gate 

cache:
  paths:
    - .gradle/

before_script:
  - chmod +x gradlew

build:
  stage: build
  script:
    - ./gradlew clean compileJava --no-daemon

test:
  stage: test
  script:
    - ./gradlew test jacocoTestReport --no-daemon
  artifacts:
    reports:
      junit: build/test-results/test/*.xml

sonar:
  stage: sonar
  script:
    - chmod +x gradlew
    - echo "=== TODAS LAS VARIABLES CI/CD ==="
    - env | sort
    - echo "================================"
    - echo "URL=$SONAR_HOST_URL"
    - ./gradlew sonar --no-daemon -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.organization=$SONAR_ORG -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.token=$SONAR_TOKEN -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml


quality_gate:
  stage: quality_gate
  image: curlimages/curl:latest
  before_script: []
  script:
    - echo "Consultando Quality Gate para el proyecto $SONAR_PROJECT_KEY en la rama $CI_COMMIT_BRANCH"
    
    - echo "Verificando autenticación con SonarCloud..."
    - |
      TOKEN_CHECK=$(curl -s -o /dev/null -w "%{http_code}" -u $SONAR_TOKEN: \
        "https://sonarcloud.io/api/authentication/validate")
      if [ "$TOKEN_CHECK" -ne 200 ]; then
        echo "❌ Error de autenticación. Código: $TOKEN_CHECK"
        exit 1
      fi
      echo "✅ Autenticación exitosa"
    
    - echo "Esperando a que SonarCloud procese el análisis..."
    - sleep 10
    
    - echo "Consultando Quality Gate (hasta 12 intentos)..."
    - |
      MAX_RETRIES=12
      RETRY_COUNT=0
      STATUS=""
      
      while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$STATUS" != "OK" ] && [ "$STATUS" != "ERROR" ]; do
        RETRY_COUNT=$((RETRY_COUNT + 1))
        echo "Intento $RETRY_COUNT de $MAX_RETRIES..."
        
        RESPONSE=$(curl -s -u $SONAR_TOKEN: \
          "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY&branch=$CI_COMMIT_BRANCH")
        
        STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
        
        if [ -z "$STATUS" ]; then
          echo "⏳ Análisis aún no disponible, esperando 10 segundos..."
          sleep 10
        elif [ "$STATUS" = "OK" ]; then
          echo "✅ Quality Gate PASSED"
          exit 0
        elif [ "$STATUS" = "ERROR" ]; then
          echo "❌ Quality Gate FAILED"
          echo "Respuesta: $RESPONSE"
          exit 1
        else
          echo "Estado actual: $STATUS"
          sleep 10
        fi
      done
      
      echo "❌ Timeout: No se pudo obtener el Quality Gate después de $MAX_RETRIES intentos"
      exit 1
      
  dependencies:
    - sonar
  only:
    - branches